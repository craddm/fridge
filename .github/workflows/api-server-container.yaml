name: Build Container

# Build container for the fridge-job-api service
# This builds for every push to the main branch and every push to the api/** branches
# but only when changes have been made to the fridge-job-api directory
# It also builds on pull requests to the main branch when those PR make changes to the fridge-job-api directory
on:
  push:
    branches:
      - main
      - api/**
    tags:
      - "api-v*"
    paths:
      - "fridge-job-api/**"
  pull_request:
    branches:
      - main
    paths:
      - "fridge-job-api/**"
  workflow_dispatch:

concurrency:
  group: "build"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels) for Docker
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},value={{tag}},match=^api-v(.*),enable=${{startsWith(github.ref, 'refs/tags/api-v')}}
            type=semver,pattern={{major}}.{{minor}},value={{tag}},match=^api-v(.*),enable=${{startsWith(github.ref, 'refs/tags/api-v')}}
            type=raw,value=latest,enable=${{startsWith(github.ref, 'refs/tags/api-v')}}
      - name: Build and push image to registry
        uses: docker/build-push-action@v7
        with:
          context: ./fridge-job-api
          # Don't push builds to ghcr on pull requests
          # However, build will be always tested
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
